modules:
  jira:issueContext:
    - key: ai-reply-assistant
      title: AI Reply Assistant
      label: AI Reply Assistant
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
  jira:globalPage:
    - key: ai-dashboard
      title: AI Support Dashboard
      resource: dashboard
      resolver:
        function: resolver
      route: ai-dashboard
  function:
    - key: resolver
      handler: resolver.handler
resources:
  - key: main
    path: static
  - key: dashboard
    path: static/dashboard
permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
  external:
    fetch:
      backend:
        - address: nsc-testing.27cltkbcyac0.eu-de.codeengine.appdomain.cloud
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/e2a25bcc-adc1-4ce0-a6a1-2b12533f8a8f
